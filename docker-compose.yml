services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - bookstore_pgdata:/var/lib/postgresql/data

volumes:
  bookstore_pgdata:
    driver: local
